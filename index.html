<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markets</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<style>
/* ── Bloomberg color tokens ─────────────────────────────────────── */
:root {
  --bg:      #000000;
  --panel:   #04040e;
  --tile:    #070714;
  --hdr:     #0B1828;
  --border:  #1E3A5F;
  --accent:  #E87722;
  --white:   #F0F0F0;
  --gray:    #999999;
  --dim:     #4A4A4A;
  --vdim:    #2A2A2A;
  --up:      #00CC44;
  --down:    #FF3333;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { min-height: 100%; overflow-x: hidden; overflow-y: auto; }
body { min-height: 100%; }

body {
  background: var(--bg);
  color: var(--gray);
  font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  user-select: none;
  font-size: 12px;
  zoom: 1.5;
  width: calc(100vw / 1.5);
  min-height: calc(100vh / 1.5);
}

/* ── Section header bars ─────────────────────────────────────────── */
.s-hdr {
  background: var(--hdr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 5px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}
.s-hdr-lbl {
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
.s-hdr-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
}
.s-hdr-meta .mkt-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
  position: relative; top: -1px;
}
.s-hdr-meta .mkt-dot.open   { background: var(--up);   box-shadow: 0 0 4px var(--up); }
.s-hdr-meta .mkt-dot.closed { background: var(--dim); }


/* ── Clocks ──────────────────────────────────────────────────────── */
#clocks-body {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 18px 40px 14px;
  background: var(--panel);
  flex-shrink: 0;
}
.clock-block { text-align: center; flex: 1; }
.clock-city {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 4px;
}
.clock-time {
  font-size: 40px;
  font-weight: 200;
  color: var(--white);
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
}
.clock-date {
  font-size: 10px;
  color: var(--dim);
  margin-top: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.clock-div { width:1px; height:48px; background: var(--border); }

/* ── Price tiles ─────────────────────────────────────────────────── */
#prices {
  display: flex;
  padding: 14px 16px;
  gap: 8px;
  flex-shrink: 0;
  background: var(--panel);
}
.price-tile {
  flex: 1;
  background: var(--tile);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 14px 16px 12px;
  transition: border-color 0.2s;
}
.price-tile:hover { border-color: var(--accent); }

.tile-label {
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.tile-price {
  font-size: 30px;
  font-weight: 300;
  color: var(--white);
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  line-height: 1;
}
.tile-change {
  margin-top: 6px;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}
.tile-change.up   { color: var(--up); }
.tile-change.down { color: var(--down); }
.tile-change.flat { color: var(--dim); }
.tile-sub {
  font-size: 9px;
  color: var(--dim);
  margin-top: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Status tiles ────────────────────────────────────────────────── */
#status-grid {
  display: flex;
  padding: 12px 16px;
  gap: 8px;
  flex-shrink: 0;
  background: var(--panel);
}
.status-tile {
  flex: 1;
  min-width: 0;
  background: var(--tile);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.2s;
  overflow: hidden;
}
.status-tile:hover { border-color: var(--accent); }
.status-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.ok       { background: var(--up);   box-shadow: 0 0 5px var(--up); }
.status-dot.warning  { background: #E8A020;      box-shadow: 0 0 5px #E8A020; }
.status-dot.critical { background: var(--down);  box-shadow: 0 0 5px var(--down); }
.status-dot.unknown  { background: var(--dim); }
.status-name {
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  white-space: nowrap;
}
.status-desc {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.5px;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Sparkline ───────────────────────────────────────────────────── */
.sparkline {
  width: 100%;
  height: 54px;
  margin-top: 10px;
  display: block;
  opacity: 0.65;
}

/* ── News list ───────────────────────────────────────────────────── */
#news-list {
  flex: 1;
  overflow: hidden;
  padding: 6px 16px 4px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0 24px;
  align-content: start;
  background: var(--panel);
}
.news-item {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid #1A1A2E;
  cursor: pointer;
  min-width: 0;
}
.news-src {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  flex-shrink: 0;
  width: 60px;
}
.news-title {
  font-size: 14px;
  color: #C8C8C8;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  transition: color 0.15s;
}
.news-item:hover .news-title { color: #FFFFFF; }
.news-age {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
  width: 32px;
  text-align: right;
}


/* ── Section edit buttons ────────────────────────────────────────── */
.s-edit-btn {
  background: var(--hdr);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: inherit;
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 2px;
  padding: 3px 8px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  text-transform: uppercase;
  border-radius: 1px;
}
.s-edit-btn:hover { background: var(--accent); color: var(--bg); }

/* ── Modal shared add-form styles ────────────────────────────────── */
.add-modal-section {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.add-modal-lbl {
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}
.add-modal-row { display: flex; gap: 6px; flex-wrap: wrap; }
.add-modal-row input, .add-modal-row select {
  background: var(--tile);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: inherit;
  font-size: 11px;
  padding: 7px 10px;
  border-radius: 1px;
  outline: none;
  transition: border-color 0.15s;
}
.add-modal-row input:focus, .add-modal-row select:focus { border-color: var(--accent); }
.add-modal-btn {
  background: var(--hdr);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: inherit;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  white-space: nowrap;
  border-radius: 1px;
  transition: background 0.15s, color 0.15s;
}
.add-modal-btn:hover { background: var(--accent); color: var(--bg); }
.add-modal-err { font-size: 10px; color: var(--down); min-height: 13px; }

/* ── Modal ───────────────────────────────────────────────────────── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }

#modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: 2px;
  width: 580px;
  max-width: 95vw;
  padding: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}

#modal-hdr {
  background: var(--hdr);
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
#modal-title {
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}
#modal-close {
  background: none; border: none;
  color: var(--dim); font-size: 14px;
  cursor: pointer; padding: 2px 6px;
  transition: color 0.15s;
  font-family: inherit;
}
#modal-close:hover { color: var(--white); }

#modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

/* tile rows */
#tile-list { display: flex; flex-direction: column; gap: 4px; }

.m-tile-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--tile);
  border: 1px solid var(--border);
  border-radius: 1px;
}
.m-tile-sym {
  font-size: 11px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 1px;
  width: 70px;
  flex-shrink: 0;
}
.m-tile-name {
  font-size: 10px;
  color: var(--gray);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.m-tile-type {
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
  width: 40px;
  flex-shrink: 0;
  text-align: right;
}
.m-row-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  width: 20px; height: 20px;
  cursor: pointer;
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
  border-radius: 1px;
  font-family: inherit;
}
.m-row-btn:hover         { color: var(--white); border-color: var(--gray); }
.m-row-btn.rm:hover      { color: var(--down);  border-color: var(--down); }

/* add form */
#add-section {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#add-lbl {
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}
#add-row { display: flex; gap: 6px; flex-wrap: wrap; }

#add-row input, #add-row select {
  background: var(--tile);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: inherit;
  font-size: 11px;
  padding: 7px 10px;
  border-radius: 1px;
  outline: none;
  transition: border-color 0.15s;
}
#add-row input:focus, #add-row select:focus { border-color: var(--accent); }
#add-sym  { flex: 2; min-width: 120px; }
#add-type { flex: 1; min-width: 100px; }
#add-name { flex: 2; min-width: 120px; }

#add-btn {
  background: var(--hdr);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: inherit;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  white-space: nowrap;
  border-radius: 1px;
  transition: background 0.15s, color 0.15s;
}
#add-btn:hover { background: var(--accent); color: var(--bg); }

#add-err { font-size: 10px; color: var(--down); min-height: 13px; }

/* footer */
#modal-ftr {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 18px 16px;
  border-top: 1px solid var(--border);
}
#modal-cancel, #modal-save {
  font-family: inherit;
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 18px;
  cursor: pointer;
  border-radius: 1px;
  transition: background 0.15s, color 0.15s;
}
#modal-cancel {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
}
#modal-cancel:hover { border-color: var(--gray); color: var(--gray); }
#modal-save {
  background: var(--hdr);
  border: 1px solid var(--accent);
  color: var(--accent);
}
#modal-save:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<!-- ── CLOCKS ─────────────────────────────────────────── -->
<div class="s-hdr">
  <span class="s-hdr-lbl">▶ Clocks</span>
  <div class="s-hdr-meta">
    <button class="s-edit-btn" id="clocks-edit-btn">⚙ Edit</button>
  </div>
</div>
<div id="clocks-body"></div>

<!-- ── MARKETS ────────────────────────────────────────── -->
<div class="s-hdr">
  <span class="s-hdr-lbl">▶ Markets</span>
  <div class="s-hdr-meta">
    <span><span class="mkt-dot closed" id="mkt-dot"></span><span id="mkt-txt">—</span></span>
    <span id="last-upd">—</span>
<button class="s-edit-btn" id="markets-edit-btn">⚙ Edit</button>
  </div>
</div>
<div id="prices"></div>

<!-- ── SYSTEMS STATUS ────────────────────────────────── -->
<div class="s-hdr">
  <span class="s-hdr-lbl">▶ Systems</span>
  <div class="s-hdr-meta">
    <span id="status-ts">—</span>
    <button class="s-edit-btn" id="systems-edit-btn">⚙ Edit</button>
  </div>
</div>
<div id="status-grid"></div>

<!-- ── NEWS ──────────────────────────────────────────── -->
<div class="s-hdr">
  <span class="s-hdr-lbl">▶ News</span>
  <div class="s-hdr-meta">
    <span id="news-ts">—</span>
  </div>
</div>
<div id="news-list"></div>


<!-- ── CONFIG MODAL ──────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-hdr">
      <span id="modal-title">⚙ Customize Tiles</span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-body">

      <!-- ── TILES ── -->
      <div id="tiles-modal-content">
        <div id="tile-list"></div>
        <div id="add-section">
          <div id="add-lbl">Add tile</div>
          <div id="add-row">
            <input  id="add-sym"  type="text" placeholder="Symbol  e.g. AAPL, ETH, GBPUSD" autocomplete="off" spellcheck="false">
            <select id="add-type">
              <option value="stock">Stock / ETF</option>
              <option value="crypto">Crypto</option>
              <option value="forex">Forex</option>
            </select>
            <input  id="add-name" type="text" placeholder="Name (optional)">
            <button id="add-btn">+ Add</button>
          </div>
          <div id="add-err"></div>
        </div>
      </div>

      <!-- ── CLOCKS ── -->
      <div id="clocks-modal-content" style="display:none">
        <div id="clock-list"></div>
        <div class="add-modal-section">
          <div class="add-modal-lbl">Add clock</div>
          <div class="add-modal-row">
            <input id="add-clock-city" type="text" placeholder="City name" autocomplete="off" style="flex:1;min-width:120px">
            <select id="add-clock-tz" style="flex:2;min-width:180px"></select>
            <button id="add-clock-btn" class="add-modal-btn">+ Add</button>
          </div>
          <div id="add-clock-err" class="add-modal-err"></div>
        </div>
      </div>

      <!-- ── SYSTEMS ── -->
      <div id="systems-modal-content" style="display:none">
        <div id="sys-list"></div>
        <div class="add-modal-section">
          <div class="add-modal-lbl">Add service</div>
          <div class="add-modal-row">
            <select id="add-sys-preset" style="flex:2;min-width:160px"></select>
            <input id="add-sys-name" type="text" placeholder="Service name" style="display:none;flex:1;min-width:120px" autocomplete="off">
            <input id="add-sys-url"  type="text" placeholder="https://…/api/v2/status.json" style="display:none;flex:3;min-width:200px" autocomplete="off">
            <button id="add-sys-btn" class="add-modal-btn">+ Add</button>
          </div>
          <div id="add-sys-err" class="add-modal-err"></div>
        </div>
      </div>

    </div>
    <div id="modal-ftr">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   CONFIG SYSTEM
================================================================ */
const DEFAULT_TILES = [
  { id:'SPY',  symbol:'SPY',    label:'SPY',     name:'S&P 500 ETF',   type:'stock',  decimals:2 },
  { id:'GLD',  symbol:'GLD',    label:'GLD',     name:'Gold ETF',      type:'stock',  decimals:2 },
  { id:'BTC',  symbol:'BTC',    label:'BTC',     name:'Bitcoin · USD', type:'crypto', decimals:0 },
  { id:'EUR',  symbol:'EURUSD', label:'EUR/USD', name:'1 EUR in USD',  type:'forex',  decimals:4 },
];

function loadConfig() {
  try {
    const raw = localStorage.getItem('dashboard_tiles');
    if (raw) {
      const p = JSON.parse(raw);
      if (Array.isArray(p) && p.length > 0) return p;
    }
  } catch(e) {}
  return DEFAULT_TILES.map(t => ({...t}));
}
function saveConfig(t) { localStorage.setItem('dashboard_tiles', JSON.stringify(t)); }

let TILES = loadConfig();

/* ================================================================
   CLOCKS
================================================================ */
const DEFAULT_CLOCKS = [
  { city:'Los Angeles', tz:'America/Los_Angeles' },
  { city:'New York',    tz:'America/New_York'    },
  { city:'Paris',       tz:'Europe/Paris'        },
];
const COMMON_TIMEZONES = [
  { label:'UTC',                   tz:'UTC'                    },
  { label:'Los Angeles (PT)',      tz:'America/Los_Angeles'    },
  { label:'Denver (MT)',           tz:'America/Denver'         },
  { label:'Chicago (CT)',          tz:'America/Chicago'        },
  { label:'New York (ET)',         tz:'America/New_York'       },
  { label:'São Paulo',             tz:'America/Sao_Paulo'      },
  { label:'London',                tz:'Europe/London'          },
  { label:'Paris / Berlin',        tz:'Europe/Paris'           },
  { label:'Cairo',                 tz:'Africa/Cairo'           },
  { label:'Moscow',                tz:'Europe/Moscow'          },
  { label:'Dubai',                 tz:'Asia/Dubai'             },
  { label:'Mumbai',                tz:'Asia/Kolkata'           },
  { label:'Singapore',             tz:'Asia/Singapore'         },
  { label:'Tokyo',                 tz:'Asia/Tokyo'             },
  { label:'Shanghai / Beijing',    tz:'Asia/Shanghai'          },
  { label:'Sydney',                tz:'Australia/Sydney'       },
  { label:'Auckland',              tz:'Pacific/Auckland'       },
];

function loadClocksConfig() {
  try { const r = JSON.parse(localStorage.getItem('dashboard_clocks')); if (Array.isArray(r) && r.length) return r; } catch(e) {}
  return DEFAULT_CLOCKS.map(c => ({...c}));
}
function saveClocksConfig(c) { localStorage.setItem('dashboard_clocks', JSON.stringify(c)); }
let CLOCKS = loadClocksConfig();

const tFmt = tz => new Intl.DateTimeFormat('en-US', { timeZone:tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
const dFmt = tz => new Intl.DateTimeFormat('en-US', { timeZone:tz, weekday:'short', month:'short', day:'numeric' });

function renderClocksDOM() {
  const body = document.getElementById('clocks-body');
  body.innerHTML = '';
  CLOCKS.forEach((c, i) => {
    if (i > 0) { const d = document.createElement('div'); d.className = 'clock-div'; body.appendChild(d); }
    const block = document.createElement('div');
    block.className = 'clock-block';
    block.id = 'clock-' + i;
    block.innerHTML = `<div class="clock-city">${c.city}</div><div class="clock-time">--:--:--</div><div class="clock-date">---</div>`;
    body.appendChild(block);
  });
}

function updateClocks() {
  const now = new Date();
  CLOCKS.forEach((c, i) => {
    const el = document.getElementById('clock-' + i);
    if (!el) return;
    el.querySelector('.clock-time').textContent = tFmt(c.tz).format(now);
    el.querySelector('.clock-date').textContent = dFmt(c.tz).format(now).toUpperCase();
  });
}
renderClocksDOM();
setInterval(updateClocks, 1000);
updateClocks();

/* ================================================================
   MARKET STATUS
================================================================ */
function updateMarketStatus() {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone:'America/New_York', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false
  }).formatToParts(new Date());
  const day  = parts.find(p => p.type === 'weekday').value;

             + parseInt(parts.find(p => p.type === 'minute').value);
  const open = ['Mon','Tue','Wed','Thu','Fri'].includes(day) && mins >= 570 && mins < 960;
  document.getElementById('mkt-dot').className = 'mkt-dot ' + (open ? 'open' : 'closed');
  document.getElementById('mkt-txt').textContent = open ? 'NYSE OPEN' : 'NYSE CLOSED';
}

================================================================ */
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal:ctrl.signal }).finally(() => clearTimeout(t));
}

async function fetchYahoo(symbol) {
  const yUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=5d&_cb=${Date.now()}`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`,
  ];
  let lastErr;
  for (const p of proxies) {
    try {
      const r = await fetchWithTimeout(p, 10000);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data   = await r.json();
      const result = data.chart?.result?.[0];
      if (!result) throw new Error('no result');
      const meta    = result.meta;
      const regPrice = meta.regularMarketPrice;
      // chartPreviousClose = yesterday's close (the dotted reference line on a 1D chart).
      // Do NOT use meta.regularMarketChange: with range=5d it reflects the 5-day change,
      // not the 1-day change, producing a wildly incorrect value.
      const prevClose = meta.chartPreviousClose ?? meta.previousClose;

      let price, change, changePct;

      if (meta.marketState === 'PRE' && meta.preMarketPrice) {
        // Pre-market: show extended-hours price, change vs. last regular close
        price     = meta.preMarketPrice;
        change    = price - regPrice;
        changePct = regPrice !== 0 ? (change / regPrice * 100) : 0;
      } else if ((meta.marketState === 'POST' || meta.marketState === 'POSTPOST') && meta.postMarketPrice) {
        // After-hours: show extended-hours price, change vs. today's regular close
        price     = meta.postMarketPrice;
        change    = price - regPrice;
        changePct = regPrice !== 0 ? (change / regPrice * 100) : 0;
      } else {
        // Regular session: change vs. yesterday's close
        price     = regPrice;
        change    = price - prevClose;
        changePct = prevClose !== 0 ? (change / prevClose * 100) : 0;
      }

      return { price, change, changePct, marketState: meta.marketState };
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

async function fetchYahooSparkline(symbol) {
  const cb = Date.now();
  const yUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=5m&range=1d&_cb=${cb}`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`,
  ];
  for (const p of proxies) {
    try {
      const r = await fetchWithTimeout(p, 10000);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const result = data.chart?.result?.[0];
      if (!result) throw new Error('no result');
      const closes = result.indicators.quote[0].close;
      const stamps  = result.timestamp;
      const pairs   = closes.map((p, i) => [p, stamps[i] * 1000]).filter(([p]) => p != null);
      return { prices: pairs.map(([p]) => p), timestamps: pairs.map(([,t]) => t) };
    } catch(e) {}
  }
  return { prices: [], timestamps: [] };
}

async function fetchCryptoSparkline(symbol) {
  const cgId = COINGECKO_IDS[symbol.toUpperCase()];
  if (!cgId) return { prices: [], timestamps: [] };
  try {
    const r = await fetchWithTimeout(
      `https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=usd&days=1`, 8000);
    if (!r.ok) return [];
    const data = await r.json();
    return {
      prices:     data.prices.map(p => p[1]),
      timestamps: data.prices.map(p => p[0]),
    };
  } catch(e) { return { prices: [], timestamps: [] }; }
}

async function fetchForexSparkline(tile) {
  const sym = tile.symbol.toUpperCase();
  const base = sym.slice(0,3), quote = sym.slice(3,6) || 'USD';
  if (base === 'EUR' || quote === 'EUR') {
    try {
      const fmt = d => d.toISOString().slice(0,10);
      const fromDate = new Date(); fromDate.setDate(fromDate.getDate() - 2);
      const r = await fetchWithTimeout(
        `https://api.frankfurter.app/${fmt(fromDate)}..?from=${base}&to=${quote}`, 8000);
      if (!r.ok) return [];
      const data = await r.json();
      const dates = Object.keys(data.rates).sort();
      return {
        prices:     dates.map(d => data.rates[d][quote]),
        timestamps: dates.map(d => new Date(d).getTime()),
      };
    } catch(e) { return { prices: [], timestamps: [] }; }
  }
  return fetchYahooSparkline(sym + '=X');
}

async function fetchSparklineData(tile) {
  switch (tile.type) {
    case 'stock':  return fetchYahooSparkline(tile.symbol);
    case 'crypto': return fetchCryptoSparkline(tile.symbol);
    case 'forex':  return fetchForexSparkline(tile);
    default: return { prices: [], timestamps: [] };
  }
}

function drawSparkline(id, data) {
  const { prices, timestamps } = (data && data.prices) ? data : { prices: data, timestamps: null };
  if (!prices || prices.length < 2) return;
  const svg = document.querySelector(`#tile-${id} .sparkline`);
  if (!svg) return;

  const W = 100, H = 42, pad = 2;
  const priceH = 32; // price area: y 0..priceH

  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;

  const hasTime = timestamps && timestamps.length === prices.length;
  const tMin = hasTime ? timestamps[0] : 0;
  const tMax = hasTime ? timestamps[timestamps.length - 1] : prices.length - 1;
  const tRange = tMax - tMin || 1;
  const toX = t => pad + ((t - tMin) / tRange) * (W - 2 * pad);

  const pts = prices.map((p, i) => {
    const x = hasTime ? toX(timestamps[i]) : pad + (i / (prices.length - 1)) * (W - 2 * pad);
    const y = priceH - pad - ((p - min) / range) * (priceH - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  // Use tile's change direction so color matches the price badge
  const changeEl = document.querySelector(`#tile-${id} .tile-change`);
  const isUp = changeEl ? changeEl.classList.contains('up') : prices[prices.length - 1] >= prices[0];
  const color    = isUp ? '#00CC44' : '#FF3333';
  const gradStop = isUp ? '#00CC44' : '#FF3333';

  const firstX = hasTime ? toX(timestamps[0]).toFixed(1) : pad;
  const lastX  = hasTime ? toX(timestamps[timestamps.length - 1]).toFixed(1) : (W - pad);

  let inner = `
    <defs>
      <linearGradient id="sg-${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="${gradStop}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${gradStop}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${pts} ${lastX},${priceH} ${firstX},${priceH}"
             fill="url(#sg-${id})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"
              stroke-linejoin="round" stroke-linecap="round"/>`;

  // Hour markers
  if (hasTime) {
    let prevHour = null;
    let lastLabelX = -Infinity;
    for (let i = 0; i < timestamps.length; i++) {
      const d = new Date(timestamps[i]);
      const hour = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-${d.getHours()}`;
      if (hour !== prevHour) {
        prevHour = hour;
        if (i === 0) continue;
        const x = toX(timestamps[i]);
        inner += `<line x1="${x.toFixed(1)}" y1="${pad}" x2="${x.toFixed(1)}" y2="${priceH}" stroke="#1E3A5F" stroke-width="0.5"/>`;
        if (x - lastLabelX >= 10) {
          const h = d.getHours();
          const label = h === 0 ? '12a' : h < 12 ? `${h}` : h === 12 ? '12p' : `${h - 12}`;
          inner += `<text x="${x.toFixed(1)}" y="40" font-size="5" fill="#555" font-family="monospace">${label}</text>`;
          lastLabelX = x;
        }
      }
    }
  }

  svg.innerHTML = inner;
}

async function fetchAWSStatus() {
  const url = 'https://status.aws.amazon.com/data.json';
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];
  for (const p of proxies) {
    try {
      const r = await fetchWithTimeout(p, 10000);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const issues = (data.current || []).filter(e => e.status > 0);
      if (issues.length === 0) return { indicator: 'none', description: 'All Systems Operational' };
      const worst = issues.reduce((a, b) => b.status > a.status ? b : a);
      return { indicator: worst.status >= 3 ? 'critical' : 'minor', description: `${issues.length} active issue${issues.length > 1 ? 's' : ''}` };
    } catch(e) {}
  }
  return { indicator: 'unknown', description: 'Unavailable' };
}

function relTime(s) {
  if (!s) return '';
  const m = Math.floor((Date.now() - new Date(s)) / 60000);
  if (m < 1)  return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m/60);
  if (h < 24) return h + 'h';
  return Math.floor(h/24) + 'd';
}

async function fetchFeed({ url, label }) {
  const r = await fetchWithTimeout(RSS2JSON + encodeURIComponent(url), 10000);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.status !== 'ok') throw new Error(`rss2json: ${d.message || 'error'}`);
  return d.items.map(i => ({ title:i.title.trim(), link:i.link, source:label, pubDate:i.pubDate }));
}

async function refreshNews() {
  try {
    const res = await Promise.allSettled(RSS_FEEDS.map(fetchFeed));
    const all = []; const seen = new Set();
    for (let i = 0; i < RSS_FEEDS.length; i++) {
      if (res[i].status === 'fulfilled') {
        for (const item of res[i].value) {
          if (!seen.has(item.title)) { seen.add(item.title); all.push(item); }
        }
      } else {
        console.warn(`News feed [${RSS_FEEDS[i].label}] failed:`, res[i].reason);

function makeUniqueId(sym, existing) {
  const base = sym.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,8);
  if (!existing.find(t => t.id === base)) return base;
  for (let n = 2; n < 99; n++) { const c = base+n; if (!existing.find(t => t.id === c)) return c; }
  return base + Date.now();
}

  const i = parseInt(btn.closest('.m-tile-row').dataset.i, 10), a = btn.dataset.a;
  const err = document.getElementById('add-err');
  if (a === 'rm') { if (draftTiles.length <= 1) { err.textContent = 'Must keep at least one.'; return; } draftTiles.splice(i,1); }
  else if (a === 'up' && i > 0) [draftTiles[i-1],draftTiles[i]] = [draftTiles[i],draftTiles[i-1]];
  else if (a === 'dn' && i < draftTiles.length-1) [draftTiles[i],draftTiles[i+1]] = [draftTiles[i+1],draftTiles[i]];
  err.textContent = ''; renderModalList();
});
document.getElementById('add-btn').addEventListener('click', () => {
  const symRaw = document.getElementById('add-sym').value.trim();
  const type   = document.getElementById('add-type').value;
  const nameRaw= document.getElementById('add-name').value.trim();
  const err    = document.getElementById('add-err');
  if (!symRaw) { err.textContent = 'Symbol is required.'; return; }
  const sym = symRaw.toUpperCase();
  if (type === 'crypto' && !COINGECKO_IDS[sym]) { err.textContent = `Unknown crypto "${sym}". Supported: ${Object.keys(COINGECKO_IDS).join(', ')}`; return; }
  if (type === 'forex' && !/^[A-Z]{6}$/.test(sym)) { err.textContent = 'Forex symbol must be 6 letters, e.g. GBPUSD'; return; }
  let label = sym;
  if (type === 'forex') label = sym.slice(0,3) + '/' + sym.slice(3,6);
  const name = nameRaw || label;
  const id = makeUniqueId(sym, draftTiles);
  draftTiles.push({ id, symbol:sym, label, name, type, decimals:defaultDec(type) });
  err.textContent = '';
  document.getElementById('add-sym').value = ''; document.getElementById('add-name').value = '';
  renderModalList();
});

/* ── CLOCKS modal ── */
function initClocksModal() {
  draftClocks = CLOCKS.map(c => ({...c}));
  renderClocksModalList();
  document.getElementById('add-clock-city').value = '';
  document.getElementById('add-clock-err').textContent = '';
  // populate timezone select
  const sel = document.getElementById('add-clock-tz');
  sel.innerHTML = COMMON_TIMEZONES.map(t => `<option value="${t.tz}">${t.label}</option>`).join('');
}
function renderClocksModalList() {
  const list = document.getElementById('clock-list');
  list.innerHTML = '';
  draftClocks.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'm-tile-row'; row.dataset.i = i;
    row.innerHTML =
      `<span class="m-tile-sym">${c.city}</span>` +
      `<span class="m-tile-name" style="color:var(--dim);font-size:9px">${c.tz}</span>` +
      `<button class="m-row-btn" data-a="up" title="Move up">↑</button>` +
      `<button class="m-row-btn" data-a="dn" title="Move down">↓</button>` +
      `<button class="m-row-btn rm" data-a="rm" title="Remove">✕</button>`;
    list.appendChild(row);
  });
}
document.getElementById('clock-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-a]'); if (!btn) return;
  const i = parseInt(btn.closest('.m-tile-row').dataset.i, 10), a = btn.dataset.a;
  const err = document.getElementById('add-clock-err');
  if (a === 'rm') { if (draftClocks.length <= 1) { err.textContent = 'Must keep at least one.'; return; } draftClocks.splice(i,1); }
  else if (a === 'up' && i > 0) [draftClocks[i-1],draftClocks[i]] = [draftClocks[i],draftClocks[i-1]];
  else if (a === 'dn' && i < draftClocks.length-1) [draftClocks[i],draftClocks[i+1]] = [draftClocks[i+1],draftClocks[i]];
  err.textContent = ''; renderClocksModalList();
});
document.getElementById('add-clock-btn').addEventListener('click', () => {
  const city = document.getElementById('add-clock-city').value.trim();
  const tz   = document.getElementById('add-clock-tz').value;
  const err  = document.getElementById('add-clock-err');
  if (!city) { err.textContent = 'City name is required.'; return; }
  draftClocks.push({ city, tz });
  err.textContent = '';
  document.getElementById('add-clock-city').value = '';
  renderClocksModalList();
});

/* ── SYSTEMS modal ── */
function initSystemsModal() {
  draftSystems = SYSTEMS.map(s => ({...s}));
  renderSystemsModalList();
  document.getElementById('add-sys-err').textContent = '';
  refreshSysDropdown();
}
function refreshSysDropdown() {
  const sel = document.getElementById('add-sys-preset');
  const inUse = new Set(draftSystems.map(s => s.name));
  const available = PRESET_SERVICES.filter(p => !inUse.has(p.name));
  sel.innerHTML =
    available.map(p => `<option value="${p.name}">${p.name}</option>`).join('') +
    `<option value="__custom__">Custom Statuspage…</option>`;
  toggleCustomSysFields();
}
function toggleCustomSysFields() {
  const isCustom = document.getElementById('add-sys-preset').value === '__custom__';
  document.getElementById('add-sys-name').style.display = isCustom ? '' : 'none';
  document.getElementById('add-sys-url').style.display  = isCustom ? '' : 'none';
}
function renderSystemsModalList() {
  const list = document.getElementById('sys-list');
  list.innerHTML = '';
  draftSystems.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'm-tile-row'; row.dataset.i = i;
    row.innerHTML =
      `<span class="m-tile-sym">${s.name}</span>` +
      `<span class="m-tile-name" style="color:var(--dim);font-size:9px">${s.link || s.url || '—'}</span>` +
      `<button class="m-row-btn" data-a="up" title="Move up">↑</button>` +
      `<button class="m-row-btn" data-a="dn" title="Move down">↓</button>` +
      `<button class="m-row-btn rm" data-a="rm" title="Remove">✕</button>`;
    list.appendChild(row);
  });
}
document.getElementById('sys-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-a]'); if (!btn) return;
  const i = parseInt(btn.closest('.m-tile-row').dataset.i, 10), a = btn.dataset.a;
  const err = document.getElementById('add-sys-err');
  if (a === 'rm') { if (draftSystems.length <= 1) { err.textContent = 'Must keep at least one.'; return; } draftSystems.splice(i,1); }
  else if (a === 'up' && i > 0) [draftSystems[i-1],draftSystems[i]] = [draftSystems[i],draftSystems[i-1]];
  else if (a === 'dn' && i < draftSystems.length-1) [draftSystems[i],draftSystems[i+1]] = [draftSystems[i+1],draftSystems[i]];
  err.textContent = ''; renderSystemsModalList();
});
document.getElementById('add-sys-preset').addEventListener('change', toggleCustomSysFields);
document.getElementById('add-sys-btn').addEventListener('click', () => {
  const preset = document.getElementById('add-sys-preset').value;
  const err    = document.getElementById('add-sys-err');
  if (preset === '__custom__') {
    const name = document.getElementById('add-sys-name').value.trim();
    const url  = document.getElementById('add-sys-url').value.trim();
    if (!name) { err.textContent = 'Service name is required.'; return; }
    if (!url || !url.startsWith('http')) { err.textContent = 'Valid URL is required.'; return; }
    const link = url.replace(/\/api\/v2\/status\.json$/, '');
    draftSystems.push({ name, url, link });
  } else {
    const p = PRESET_SERVICES.find(p => p.name === preset);
    if (!p) { err.textContent = 'Select a service.'; return; }
    draftSystems.push({ name:p.name, url:p.url, link:p.link });
  }
  err.textContent = '';
  renderSystemsModalList();
  refreshSysDropdown(); // refresh dropdown without resetting draftSystems
});

/* ── save / cancel / close ── */
document.getElementById('modal-save').addEventListener('click', () => {
  if (currentModalMode === 'tiles') {
    TILES = draftTiles.map(t => ({...t}));
    saveConfig(TILES); closeModal(); renderTileDOM(); refreshPrices(); refreshSparklines();
  } else if (currentModalMode === 'clocks') {
    CLOCKS = draftClocks.map(c => ({...c}));
    saveClocksConfig(CLOCKS); closeModal(); renderClocksDOM(); updateClocks();
  } else if (currentModalMode === 'systems') {
    SYSTEMS = draftSystems.map(s => ({...s}));
    saveSystemsConfig(SYSTEMS); closeModal(); refreshStatus();
  }
});
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('markets-edit-btn').addEventListener('click', () => openModal('tiles'));
document.getElementById('clocks-edit-btn').addEventListener('click',  () => openModal('clocks'));
document.getElementById('systems-edit-btn').addEventListener('click', () => openModal('systems'));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
